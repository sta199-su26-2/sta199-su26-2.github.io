project:
  type: website
  resources:
    - misc_files/**
    - schedule.csv

website:
  page-navigation: true
  title: "STA 199"
  description: "Homepage for STA 199 - Introduction to Data Science at Duke University, Summer 2026: Session 2."
  site-url: "https://sta199-su26-2.github.io/"

  repo-url: https://github.com/sta199-su26-2/sta199-su26-2.github.io
  repo-actions: [edit, issue]

  open-graph: true
  twitter-card:
    creator: "@minebocek"
    image: "img/twitter-card-ks.pdf"

  draft-mode: unlinked

  sidebar:
    background: "#2774AE"
    foreground: "#FFD100"
    logo: "img/logo.png"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/sta199-su26-2
        text: "GitHub organization"
      - icon: code-square
        href: https://cmgr.oit.duke.edu/containers
        text: "RStudio containers"
    style: docked
    search: true
    collapse-level: 1
    contents:
      - section: "Course Information"
        contents:
          - href: course-overview.qmd
            text: Overview
          - href: course-syllabus.qmd
            text: Syllabus
          - href: course-team.qmd
            text: Team
          - href: course-support.qmd
            text: Couse Support
          - href: index.qmd
            text: Schedule
          - href: course-links.qmd
            text: Useful Links
      - section: "Computing"
        contents:
          - href: computing-access.qmd
            text: Access
          - href: computing-cheatsheets.qmd
            text: Cheatsheets
          - href: coding-principles-oh.qmd
            text: Coding principles
          - href: computing-troubleshooting.qmd
            text: Troubleshooting
      - section: "Project"
      - lab.qmd
      - ae.qmd
            
  page-footer:
    right: 'This page is built with [{{< fa heart >}}]{style="color: #FFD100;"} and [Quarto](https://quarto.org/).'
    left: "&copy; Copyright 2026, Mine Çetinkaya-Rundel, Marie Neubrander, John Zito, Katie Solarz, Josh Lim"
    background: "#2774AE"

format:
  html:
    theme: cosmo
    css:
      - style/sta199.scss

linkcolor: "#2774AE"
toc: true
code-copy: hover
code-link: true
code-overflow: wrap

execute:
  freeze: auto

editor: visual
